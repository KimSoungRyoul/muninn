# kind E2E QA 매니페스트 (게이트웨이 경유, §3) — claude-code 런타임이 Anthropic 호환 게이트웨이
# 를 통해 비-Claude 모델(gemma-4-31B-it)로 HuginnAgent 파이프라인을 도는지 검증한다.
#
# 핵심: agent.runtime=claude-code + baseUrl/model/authStyle 만으로 비-Claude 모델 구동
#       (huginn-self Go 백엔드 불요 — 게이트웨이가 /v1/messages 호환이므로).
#
# 사용 순서(QA):
#   1) kind + CRD install + operator(ENABLE_WEBHOOKS=false) 실행:  make run-kind CONTAINER_TOOL=podman
#   2) 게이트웨이 bearer 토큰 Secret 생성(커밋 금지) — agent-secrets 의 anthropic-auth-token 키:
#        kubectl -n ns-huginn-e2e create secret generic agent-secrets \
#          --from-literal=anthropic-auth-token="$GATEWAY_API_KEY"
#   3) 본 매니페스트 apply → HuginnRun→Job→Pod 가 gemma 로 SDK 실행
#   4) kubectl -n ns-huginn-e2e get hissue,hrun,job,pod 로 Succeeded 확인
#   5) kubectl -n ns-huginn-e2e logs job/<run>  → "live 시작: … model=gemma-4-31B-it" + 최종 JSON 확인
---
apiVersion: v1
kind: Namespace
metadata:
  name: ns-huginn-e2e
---
# Job 이 사용하는 SA(§6.1). 자기 namespace Secret/CM 만 read.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: huginn-agent
  namespace: ns-huginn-e2e
---
apiVersion: muninn.io/v1beta1
kind: HuginnAgent
metadata:
  name: e2e-gemma
  namespace: ns-huginn-e2e
  labels:
    muninn.io/workspace: ns-huginn-e2e   # workspace = namespace 단일 진실원천(§3.1)
spec:
  workspaceId: ns-huginn-e2e             # metadata.namespace 와 동일(webhook 가 workspaceId==namespace 강제)
  displayName: "Gemma gateway E2E probe"
  kind: other
  output: github_issue
  source:
    provider: github
    repo: acme/e2e-probe
    defaultBranch: main
  trigger:
    severityThreshold: warning
  guardrails:
    maxIterations: 2
    maxCostUsd: 1
  identity:
    k8sNamespace: ns-huginn-e2e
  agent:
    runtime: claude-code
    image: ghcr.io/kimsoungryoul/muninn/agent-runtime:dev
    # §3 게이트웨이: Anthropic /v1/messages 호환 게이트웨이 경유로 비-Claude 모델 구동.
    baseUrl: https://llm-gateway.example.com
    model: gemma-4-31B-it
    authStyle: bearer                    # → ANTHROPIC_AUTH_TOKEN(Bearer), agent-secrets/anthropic-auth-token
---
apiVersion: muninn.io/v1beta1
kind: HuginnIssue
metadata:
  name: e2e-gemma-issue
  namespace: ns-huginn-e2e
  labels:
    muninn.io/workspace: ns-huginn-e2e   # workspace = namespace(§3.1)
    muninn.io/agent: e2e-gemma
spec:
  agentRef: e2e-gemma
  goal: "연결 점검입니다. 도구를 사용하지 말고 정확히 'HUGINN_OK' 한 단어만 출력하세요."
  event:
    id: e2e-gemma-1
    source: manual
    severity: warning
    fingerprint: e2e-gemma-1
    title: "gemma gateway QA"
  inheritedGuardrails:
    maxIterations: 2
    maxCostUsd: 1
  identity:
    k8sNamespace: ns-huginn-e2e
  retryPolicy:
    maxRuns: 1
    backoff: none

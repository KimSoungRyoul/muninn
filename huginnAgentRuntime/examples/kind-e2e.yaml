# kind E2E QA 매니페스트 — agent-runtime 이미지가 HuginnAgent 파이프라인에서
# claude-agent-sdk 를 실행하는지 검증한다.
#
# 사용 순서(QA):
#   1) kind 클러스터 + CRD install + operator(ENABLE_WEBHOOKS=false) 실행
#   2) agent-runtime 이미지를 kind 에 load
#   3) 인증 Secret 을 런타임에 생성(커밋 금지):
#        kubectl -n ns-huginn-e2e create secret generic agent-secrets \
#          --from-literal=claude-code-oauth-token="$CLAUDE_CODE_OAUTH_TOKEN"
#      (또는 API 키 없이 파이프라인만 점검: --from-literal=anthropic-api-key=SELFTEST)
#   4) 본 매니페스트 apply → HuginnRun→Job→Pod 가 이미지로 SDK 실행
#   5) kubectl -n ns-huginn-e2e get hissue,hrun,job,pod 로 Succeeded 확인
---
apiVersion: v1
kind: Namespace
metadata:
  name: ns-huginn-e2e
---
# Job 이 사용하는 SA(§6.1). 자기 namespace Secret/CM 만 read.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: huginn-agent
  namespace: ns-huginn-e2e
---
apiVersion: muninn.io/v1beta1
kind: HuginnAgent
metadata:
  name: e2e-probe
  namespace: ns-huginn-e2e
  labels:
    muninn.io/workspace: ns-huginn-e2e   # workspace = namespace 단일 진실원천(§3.1)
spec:
  workspaceId: ns-huginn-e2e             # metadata.namespace 와 동일(webhook 가 workspaceId==namespace 강제)
  displayName: "Agent runtime E2E probe"
  kind: other
  output: github_issue
  source:
    provider: github
    repo: acme/e2e-probe
    defaultBranch: main
  trigger:
    severityThreshold: warning
  guardrails:
    maxIterations: 2
    maxCostUsd: 1
  identity:
    k8sNamespace: ns-huginn-e2e
  agent:
    runtime: claude-code
    image: ghcr.io/kimsoungryoul/muninn/agent-runtime:dev
---
apiVersion: muninn.io/v1beta1
kind: HuginnIssue
metadata:
  name: e2e-probe-issue
  namespace: ns-huginn-e2e
  labels:
    muninn.io/workspace: ns-huginn-e2e   # workspace = namespace(§3.1)
    muninn.io/agent: e2e-probe
spec:
  agentRef: e2e-probe
  goal: "연결 점검입니다. 도구를 사용하지 말고 정확히 'HUGINN_OK' 한 단어만 출력하세요."
  event:
    id: e2e-1
    source: manual
    severity: warning
    fingerprint: e2e-probe-1
    title: "agent-runtime image QA"
  inheritedGuardrails:
    maxIterations: 2
    maxCostUsd: 1
  identity:
    k8sNamespace: ns-huginn-e2e
  retryPolicy:
    maxRuns: 1
    backoff: none

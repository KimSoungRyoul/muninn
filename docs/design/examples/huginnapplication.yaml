# HuginnApplication — 운영 대상 1개를 표현하는 CRD 인스턴스.
# Muninn UI 의 "새 Application 등록" 위저드가 이 spec 으로 직렬화된다.
# 아키텍처 그림의 "Huginn Custom Resource (Application 들로 한번에 생성)" 에 해당.
apiVersion: muninn.io/v1beta1
kind: HuginnApplication
metadata:
  name: pct-model-server            # UI 검증 규칙: ^[a-z0-9-]+$
  namespace: ns-ai-platform         # Operator 가 spec.workspaceId 로 강제(§6.1)
  labels:
    muninn.io/workspace: ws-ai      # selector 보조용(권위는 spec.workspaceId)
spec:
  workspaceId: ws-ai                # ★ v0.2: 1급 필드(required, immutable). admission webhook 가 멤버십 검증
  displayName: "PCT Model Server"
  description: "추론 서비스 (Triton Inference Server)"
  kind: triton                      # triton | fastapi | airflow | other
  output: pull_request              # pull_request | issue

  # --- Source: GitHub 은 모든 앱에 자동 연결(필수) ---
  source:
    provider: github
    repo: acme/pct-model-server
    defaultBranch: main
    pr:
      draft: true                   # 항상 draft 로 생성(강제)
      labels: [huginn, automated]
      requireApprovalOnWorkflowChange: true
      approvalTriggers:             # ★ v0.2: 승인 필수 조건 정책화(§6.4)
        onDependencyChange: true
        onLargeDiff: { lines: 200 }
        onWorkflowChange: true
        onGuardrailNearLimit: { percent: 60 }
    secretRef: gh-ai-pat            # fine-grained PAT(특정 repo, PR 생성만; §6.2)

  # --- Trigger ---
  trigger:
    severityThreshold: warning      # info | warning | error | critical

  # --- Guardrails (프로토타입 기본값) ---
  guardrails:
    maxIterations: 12               # → SDK max_turns
    maxCostUsd: 5                   # → SDK max_budget_usd (cost 는 예상치)
    dailyRunCap: 50                 # 24h 슬라이딩 윈도우 Run 상한

  # --- Bindings: 에이전트가 사용할 Platform Tool (MCP 서버). 모든 Session 의 기본값 source ---
  bindings:
    deployment:
      argocd: { instance: production-argocd }   # kind!=airflow → ArgoCD(UX 힌트의 결과를 명시 저장)
    observability:
      grafana: { instance: platform-grafana, dashboardUid: abc123 }
      loki:    { instance: prod-loki, defaultQuery: '{app="pct-model-server"}' }   # read-only
      tempo:   { instance: prod-tempo, defaultService: pct-model-server }
      metrics: { backend: mimir, instance: prod-mimir,
                 defaultFilter: '{kubernetes_app="pct-model-server"}' }
    registry:
      harbor:  { instance: harbor-prod }        # PR 전 이미지 취약점 스캔

  # --- Identity: 관측 신호 ↔ 워크로드 매핑(Session 으로 상속) ---
  identity:
    otelServiceName: pct-model-server
    k8sNamespace: ns-ai-platform
    k8sLabels: { app: pct-model-server }

  # --- Agent ---
  agent:
    runtime: claude-code            # claude_skill.sh 가 실행하는 런타임
    soulRef: soul-pct-model-server  # SOUL.md(ConfigMap). Operator 가 Run 생성 시 MUNINN_SOUL_REF 로 주입
    image: registry.platform.local/huginn/agent-runtime:0.1.0

status:
  webhookUrl: https://muninn-api.platform.local/hooks/pct-model-server   # Operator 발급(§4.5)
  phase: Ready                      # Pending | Ready | Degraded
  activeSessions: 2                 # Operator 가 reconcile 마다 계산(§8.4)
  lastEventAt: "2026-06-03T14:33:40+09:00"
  memoryCount: { app: 3, globalShared: 3 }
  conditions:                       # K8s 표준
    - type: Ready
      status: "True"
      reason: WebhookRegistered
      message: "webhook URL 발급 및 bindings 검증 완료"
      lastTransitionTime: "2026-06-03T09:00:00+09:00"

                  recalledMemoryIds: 위임 직전 Muninn API 가 회상한 기억 id(감사 추적 + 에이전트 seed).
                  설계 §3.1/§7 — 회상한 근거 기억을 이슈에 동봉한다.
                items:
                  type: string
                type: array
              retryPolicy:
                description: 'retryPolicy: 재시도 상한/백오프'
                properties:
                  backoff:
                    default: exponential
                    description: 'BackoffPolicy 는 재시도 간 대기 증가 방식(operator-design §2.1:
                      Issue controller 가 RequeueAfter 로 구현).'
                    enum:
                    - exponential
                    - linear
                    - none
                    type: string
                  maxRuns:
                    default: 3
                    description: |-
                      maxRuns: 세션이 만들 수 있는 Run 총개수 상한(operator-design §2.1).
                      Job backoffLimit 이 아니라 attempt 별 HuginnRun 생성 상한이다.
                      Maximum=10: backoff 지수(1<<attempt) overflow/폭주 방지(huginnissue_controller.backoffReady 가드와 짝).
                    format: int32
                    maximum: 10
                    minimum: 1
                    type: integer
                required:
                - maxRuns
                type: object
              suspend:
                description: 'suspend: true 면 Operator 가 활성 Run 들을 취소시킨다(operator-design
                  §2.3)'
                type: boolean
              userPrompt:
                description: 'userPrompt: manual 트리거의 원본 운영자 프롬프트(감사·재실행). webhook
                  이면 비운다.'
                type: string
            required:
            - agentRef
            - event
            - goal
            - identity
            - inheritedGuardrails
            type: object
          status:
            description: HuginnIssueStatus defines the observed state of HuginnIssue.
            properties:
              approval:
                description: 'approval: AwaitingApproval 시 승인 메타 집계(§6.4)'
                properties:
                  decidedAt:
                    description: 'decidedAt: 승인/거절 결정 시각(ISO8601). Muninn API(approve/reject
                      route)가 기록(§6.4).'
                    format: date-time
                    type: string
                  decidedBy:
                    type: string
                  expiresAt:
                    format: date-time
                    type: string
                  reason:
                    description: 'reason: 거절 사유(reject 시). Muninn API 가 기록(§6.4).'
                    type: string
                  reasons:
                    items:
                      description: ApprovalReason 은 승인 필요 사유 1건(§6.4).
                      properties:
                        detail:
                          type: string
                        type:
                          type: string
                      required:
                      - type
                      type: object
                    type: array
                  requestedAt:
                    format: date-time
                    type: string
                  state:
                    description: ApprovalState 는 승인 결정 상태.
                    enum:
                    - Pending
                    - Approved
                    - Rejected
                    - Expired
                    type: string
                type: object
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              dedupCount:
                description: 'dedupCount: 같은 fingerprint 누적(§4.4). Muninn API 가 갱신.'
                format: int32
                type: integer
              observedRuns:
                description: 'observedRuns: 지금까지 생성한 Run 수(재시도 상한 판정용; Operator 소유)'
                format: int32
                type: integer
              outcome:
                description: 'outcome: 완료 시 "PR #842" / "Issue #143". Agent→API 가
                  갱신.'
                type: string
              phase:
                description: IssuePhase 는 세션 거시 상태(§3.4). Run 들의 phase 집계로 산출.
                enum:
                - Pending
                - Running
                - AwaitingApproval
                - Succeeded
                - Failed
                - Cancelled
                type: string
              runRefs:
                description: 'runRefs: 생성된 HuginnRun 이름들(attempt 순)'
                items:
                  type: string
                type: array
            type: object
        required:
        - spec
        type: object
    served: true
    storage: false
    subresources:
      status: {}

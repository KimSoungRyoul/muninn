      type: string
    - jsonPath: .spec.event.severity
      name: Severity
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.observedRuns
      name: Runs
      type: integer
    - jsonPath: .status.dedupCount
      name: Dedup
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: HuginnIssue is the Schema for the huginnissues API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.

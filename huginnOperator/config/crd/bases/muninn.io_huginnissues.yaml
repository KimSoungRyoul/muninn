            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              HuginnIssueSpec defines the desired state of HuginnIssue.
              생성 후 불변(이벤트 1건 = Issue 1개; 재시도는 새 attempt Run): agentRef/event/inheritedGuardrails 는 CEL 로 immutable.
            properties:
              agentRef:
                description: 'agentRef: 부모 HuginnAgent 의 metadata.name(도메인상 "Application").'
                minLength: 1
                type: string
                x-kubernetes-validations:
                - message: agentRef is immutable
                  rule: self == oldSelf
              event:
                description: 'event: 정규화된 이벤트 페이로드(§4.3)'
                properties:
                  fingerprint:
                    type: string
                  id:
                    type: string
                  payload:
                    additionalProperties:
                      type: string
                    description: 'payload: 정규화 요약(키-값)'
                    type: object
                  payloadSecretRef:
                    description: 'payloadSecretRef: 원본 alert JSON(민감정보 가능) Secret
                      이름'
                    type: string
                  receivedAt:
                    format: date-time
                    type: string
                  severity:
                    description: Severity 는 이벤트 심각도.
                    enum:
                    - info
                    - warning
                    - error
                    - critical
                    type: string
                  source:
                    description: EventSource 는 트리거 출처.
                    enum:
                    - grafana
                    - airflow
                    - argocd
                    - manual
                    type: string
                  title:
                    type: string

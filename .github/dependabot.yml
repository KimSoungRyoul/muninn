# Dependabot — 의존성 업데이트 자동화(주간; 보안 패치는 Dependabot 이 즉시 별도 PR).
# 영향 생태계 5개: npm/pnpm(muninnWeb·muninnDocs), gomod(huginnOperator), pip(agent), docker, github-actions.
# next 14.2.x 같은 정체를 구조적으로 방지하고, github-actions 의 커밋 SHA 핀 갱신도 자동화한다.
#
# 라벨: 커스텀 라벨(dependencies/컴포넌트별)이 저장소에 없어 Dependabot 이 조용히 무시하던
# `labels:` 설정을 제거했다(#47). 라벨 기반 분류가 필요하면 먼저 `gh label create` 로 라벨을
# 만든 뒤 각 생태계에 `labels:` 를 다시 추가하라 — 미존재 라벨 참조는 no-op 라 혼동만 준다.
version: 2
updates:
  # ── muninnWeb (npm/pnpm) ──
  - package-ecosystem: npm
    directory: /muninnWeb
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "build(muninnWeb)"
    groups:
      # 보안 외 마이너/패치 업데이트는 묶어 PR 소음을 줄인다.
      minor-and-patch:
        update-types: ["minor", "patch"]

  # ── muninnDocs (npm/pnpm) ──
  # ⚠️ zod 는 pnpm.overrides 로 4.1.12 에 핀(nextra-theme-docs 4.6.1 의 zod 4.4 비호환) —
  #    Dependabot 은 overrides 를 갱신하지 않으므로 nextra 가 호환을 고치면 수동 제거.
  - package-ecosystem: npm
    directory: /muninnDocs
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "build(muninnDocs)"
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  # ── huginnOperator (Go modules) ──
  - package-ecosystem: gomod
    directory: /huginnOperator
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "build(operator)"
    groups:
      k8s:
        # controller-runtime + k8s.io 는 버전이 맞물리므로 함께 올린다.
        patterns:
          - "k8s.io/*"
          - "sigs.k8s.io/*"

  # ── huginnAgentRuntime/agent (pip) ──
  - package-ecosystem: pip
    directory: /huginnAgentRuntime/agent
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build(agent)"

  # ── Docker base images (agent-runtime + web) ──
  - package-ecosystem: docker
    directories:
      - /huginnAgentRuntime
      - /muninnWeb
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build(docker)"

  # ── GitHub Actions (SHA 핀 갱신 자동화) ──
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"

# muninnWeb(Next.js 콘솔 + Muninn API) CI — lockfile 정합성 + lint + build(타입체크 게이트).
#   - PR / main 푸시: muninnWeb/** 또는 이 워크플로 변경 시 실행.
#   - `pnpm build`(= next build)는 muninnWeb 의 타입체크 게이트다(실 K8s/DB 배선 코드 포함).
#   - 빌드는 Anthropic/K8s/DB 에 접속하지 않는다(런타임에만 배선) → 자격 불필요.
#   - node 22(LTS): Next15/React19 호환. pnpm 버전은 package.json 의 packageManager 필드를 따른다.
# uses 는 커밋 SHA 로 핀(태그 주석 병기). github-actions Dependabot 이 SHA 핀 갱신을 자동화한다.
name: web-ci

on:
  push:
    branches: [main]
    paths:
      - muninnWeb/**
      - .github/workflows/web-ci.yml
  pull_request:
    paths:
      - muninnWeb/**
      - .github/workflows/web-ci.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: muninnWeb
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # pnpm/action-setup v6: package.json 의 packageManager(pnpm@9.12.0)에서 버전을 읽으므로
      #   version 입력을 명시하지 않는다(병기 시 v6 는 충돌 에러). setup-node 의 cache:pnpm 보다 먼저 와야 함.
      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: muninnWeb/pnpm-lock.yaml

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build (type-check gate)
        run: pnpm build
        env:
          # Next telemetry off(CI 소음/네트워크 회피).
          NEXT_TELEMETRY_DISABLED: "1"

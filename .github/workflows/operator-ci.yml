# huginnOperator(Go operator) CI — 빌드 + lint + 단위/envtest 테스트 + 생성물 동기화 가드 + 취약점 스캔.
#   - PR / main 푸시: huginnOperator/** , deploy/helm/** , 또는 이 워크플로 변경 시 실행.
#   - `make lint` 는 커스텀 golangci-lint(logcheck 플러그인 포함)를 빌드해 실행.
#     custom-gcl 빌드는 go.mod 의 go 버전(현재 1.26)을 요구하므로 setup-go 는 go-version-file 로 정확히 맞춘다.
#   - `make test` 는 manifests/generate/fmt/vet + envtest(etcd/kube-apiserver 자동 다운로드)를 수행.
#   - govulncheck: 실호출(reachable) HIGH 취약점 발견 시 실패(기본 동작). deps 최신화로 노출 차단.
# uses 는 커밋 SHA 로 핀(태그 주석 병기). github-actions Dependabot 이 SHA 핀 갱신을 자동화한다.
name: operator-ci

on:
  push:
    branches: [main]
    paths:
      - huginnOperator/**
      - deploy/helm/**
      - .github/workflows/operator-ci.yml
  pull_request:
    paths:
      - huginnOperator/**
      - deploy/helm/**
      - .github/workflows/operator-ci.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: operator-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: huginnOperator
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # go-version-file 로 go.mod(go 1.26)를 그대로 따른다 — custom-gcl(make lint)이 "go1.25 < 1.26" 으로
      # 실패하지 않도록 toolchain 을 go.mod 와 정확히 일치시킨다.
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: huginnOperator/go.mod
          cache-dependency-path: huginnOperator/go.sum

      - name: Build
        run: go build ./...

      - name: Lint
        run: make lint

      # govulncheck: 호출 그래프 기반으로 실제 도달 가능한(reachable) 취약점만 실패시킨다(기본 동작).
      #   설치 취약점이 있어도 호출되지 않으면 통과 → 스푸리어스 red 최소화. continue-on-error 두지 않음(신뢰성).
      #   버전 핀(@latest 금지) → 재현성 확보. @latest 는 매 실행마다 다른 바이너리를 설치해
      #   어제 green 이던 빌드가 오늘 red 날 수 있다. (이 핀은 go install 인자라 Dependabot 추적 밖 —
      #   수동 상향. go.mod tool 의존성으로 올리면 gomod Dependabot 이 추적 가능.)
      #   주의: stdlib reachable CVE 가 공개되면, govulncheck 가 go.mod 의 toolchain 으로 판정하므로
      #   무관 PR 도 red 가 될 수 있다 — 해소는 go.mod toolchain 패치 상향(operator 범위).
      - name: Vulnerability scan (govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          "$(go env GOPATH)/bin/govulncheck" ./...

      - name: Test (unit + envtest)
        run: make test

      # 생성물 동기화 가드: manifests/generate 결과가 커밋과 일치하는지(개발자가 재생성 후 커밋했는지) 검증.
      - name: Verify generated manifests are committed
        run: |
          make manifests generate
          git diff --exit-code -- config api \
            || (echo '::error::config/api 생성물이 코드와 어긋납니다. `make manifests generate` 후 커밋하세요.' && exit 1)

  # helm chart 검증: lint + template + crds 가 operator 원본과 동기화돼 있는지.
  helm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Helm lint
        run: helm lint deploy/helm/muninn

      - name: Helm template (default + metaDb on)
        run: |
          helm template muninn deploy/helm/muninn > /dev/null
          helm template muninn deploy/helm/muninn \
            --set metaDb.enabled=true \
            --set metaDb.existingSecret=muninn-metadb-app > /dev/null

      # helm crds/ 는 operator config/crd/bases 의 수동 복사다. drift 시 helm 설치 클러스터만 스키마가 오래된다.
      - name: Verify helm CRDs match operator source
        run: |
          for f in muninn.io_huginnagents.yaml muninn.io_huginnissues.yaml muninn.io_huginnruns.yaml; do
            diff "huginnOperator/config/crd/bases/$f" "deploy/helm/muninn/crds/$f" \
              || (echo "::error::deploy/helm/muninn/crds/$f 가 operator 원본과 다릅니다. config/crd/bases 에서 복사하세요." && exit 1)
          done

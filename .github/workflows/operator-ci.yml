# huginnOperator(Go operator) CI — 빌드 + 단위/envtest 테스트.
#   - PR / main 푸시: huginnOperator/** 또는 이 워크플로 변경 시 `make test` 실행.
#   - `make test` 는 manifests/generate/fmt/vet + envtest(etcd/kube-apiserver 자동 다운로드)를 수행.
# lint(golangci-lint, 커스텀 logcheck 플러그인)는 사전존재 gocyclo 위반 해소 후 별도로 추가 예정.
# 보안 강화 후속(선택): action 을 major 태그 대신 커밋 SHA 로 핀.
name: operator-ci

on:
  push:
    branches: [main]
    paths:
      - huginnOperator/**
      - .github/workflows/operator-ci.yml
  pull_request:
    paths:
      - huginnOperator/**
      - .github/workflows/operator-ci.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: operator-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: huginnOperator
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: huginnOperator/go.mod
          cache-dependency-path: huginnOperator/go.sum

      - name: Build
        run: go build ./...

      - name: Test (unit + envtest)
        run: make test

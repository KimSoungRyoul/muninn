# Huginn agent-runtime 이미지를 GitHub Packages(ghcr.io)로 빌드·관리한다.
#   - PR            : build job 만 — amd64 단일 빌드 + selftest(오프라인 배선 점검) + trivy 스캔. 푸시 안 함.
#   - main 푸시     : build(검증) → publish — latest + sha-<short> 태그로 멀티아치 push.
#   - v* 태그 푸시  : build(검증) → publish — semver 태그로 push.
#
# 보안:
#   - packages:write 는 publish job 에만 부여한다(PR 빌드 컨텍스트에는 쓰기 토큰을 주지 않는다).
#     최상위는 contents:read 만. (서드파티 액션 탈취 시 PR 빌드에서 ghcr 변조 경로를 차단.)
#   - selftest 를 publish 전에 강제한다(claude CLI 핀/venv/SDK import/claude_skill.sh 회귀를 push 전에 차단).
#   - trivy: build job 에서 로드된 이미지를 CRITICAL,HIGH 로 스캔. exit-code:0 = 리포트 위주(스푸리어스 red 방지),
#     ignore-unfixed:true 로 수정본 없는 OS 패키지 노이즈 제거. 게이트화(exit-code:1)는 후속 작업.
# uses 는 커밋 SHA 로 핀(태그 주석 병기). github-actions Dependabot 이 SHA 핀 갱신을 자동화한다.
name: agent-runtime-image

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - huginnAgentRuntime/**
      - .github/workflows/agent-runtime-image.yml
  pull_request:
    paths:
      - huginnAgentRuntime/**
      - .github/workflows/agent-runtime-image.yml
  workflow_dispatch:

env:
  IMAGE: ghcr.io/kimsoungryoul/muninn/agent-runtime

# 최상위는 읽기만. 쓰기 권한은 publish job 에서만 승격한다.
permissions:
  contents: read

concurrency:
  group: agent-runtime-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 검증: amd64 이미지를 로컬 적재(load)해 selftest + trivy 스캔. 푸시하지 않음(쓰기 토큰 없음). ──
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # SARIF 를 code-scanning 으로 업로드하려면 필요(아래 upload-sarif). 결과를 PR Security 탭에 노출.
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build amd64 image (load for selftest)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./huginnAgentRuntime
          file: ./huginnAgentRuntime/Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ env.IMAGE }}:ci-selftest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # provenance/SBOM 은 멀티아치 publish job 에서 처리(load 빌드는 단일 아치).
          provenance: false

      - name: Selftest (offline tool+SDK 배선 점검, API 호출 없음)
        run: docker run --rm ${{ env.IMAGE }}:ci-selftest selftest

      # 이미지 취약점 스캔(리포트 위주). exit-code:0 → 발견돼도 빌드를 red 로 떨구지 않음.
      #   ignore-unfixed:true → 패치본 없는 OS 패키지 제외. 결과는 SARIF 로 저장·업로드.
      - name: Scan image (trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:ci-selftest
          format: sarif
          output: trivy-agent-runtime.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      # PR Security 탭에 추세를 남긴다(category 로 이미지별 분리). 스캔이 실패해도 always() 로 업로드.
      # fork PR 은 GITHUB_TOKEN 이 read-only 로 강등돼 upload-sarif 가 403 으로 실패하므로
      # continue-on-error 로 외부 기여 PR 체크가 red 되는 것을 막는다(업로드는 same-repo/main 에서만 성공).
      - name: Upload trivy SARIF to code-scanning
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-agent-runtime.sarif
          category: trivy-agent-runtime

      # 아티팩트 보관(다운로드해 상세 확인용). code-scanning 업로드와 병행.
      - name: Upload trivy report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-agent-runtime-sarif
          path: trivy-agent-runtime.sarif
          if-no-files-found: warn

  # ── 발행: PR 이 아닐 때만(main/tag). build(검증) 통과가 전제. 여기서만 packages:write. ──
  publish:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./huginnAgentRuntime
          file: ./huginnAgentRuntime/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # 이 이미지는 클러스터에서 Secret 을 주입받아 도는 에이전트 런타임 → 출처/무결성 검증 수단 제공.
          provenance: mode=max
          sbom: true

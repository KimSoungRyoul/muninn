# Huginn agent-runtime 이미지를 GitHub Packages(ghcr.io)로 빌드·관리한다.
#   - PR            : 빌드만(푸시 안 함) — Dockerfile 검증
#   - main 푸시     : latest + sha-<short> 태그로 푸시
#   - v* 태그 푸시  : semver 태그로 푸시
# 멀티아치(linux/amd64, linux/arm64).
#
# 보안 강화 후속(선택): action 을 major 태그 대신 커밋 SHA 로 핀.
name: agent-runtime-image

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - huginnAgentRuntime/**
      - .github/workflows/agent-runtime-image.yml
  pull_request:
    paths:
      - huginnAgentRuntime/**
      - .github/workflows/agent-runtime-image.yml
  workflow_dispatch:

env:
  IMAGE: ghcr.io/kimsoungryoul/muninn/agent-runtime

permissions:
  contents: read
  packages: write

concurrency:
  group: agent-runtime-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # PR 이 아닐 때만 로그인(=푸시할 때만 자격 사용)
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./huginnAgentRuntime
          file: ./huginnAgentRuntime/Dockerfile
          # PR=amd64 단일(검증), push/tag=멀티아치(QEMU arm64 에뮬레이션은 푸시 빌드에만)
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

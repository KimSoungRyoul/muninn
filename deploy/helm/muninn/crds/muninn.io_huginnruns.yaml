                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              cost:
                type: string
              durationSeconds:
                format: int64
                type: integer
              finishedAt:
                format: date-time
                type: string
              jobName:
                description: 'jobName: Operator 가 만든 Job 이름'
                type: string
              maxCostUsd:
                format: int32
                type: integer
              maxStep:
                format: int32
                type: integer
              maxTokens:
                format: int64
                type: integer
              output:
                type: string
              phase:
                description: RunPhase 는 Run 의 실행 상태(§3.4).
                enum:
                - Queued
                - Pending
                - Running
                - AwaitingApproval
                - Succeeded
                - Failed
                - Cancelled
                type: string
              recalledMemoryIds:
                items:
                  description: RecalledMemory 는 회상된 기억 단편(§5.6). Muninn API 가 recall-report
                    로 갱신.
                  properties:
                    id:
                      type: string
                    reason:
                      type: string
                    score:
                      description: 'score: 0~1 정규화 점수(decimal 문자열로 표기해 CRD float 모호성
                        회피)'
                      type: string
                  required:
                  - id
                  type: object
                type: array
              sessionId:
                description: |-
                  sessionId: 이 Run 의 Claude Code 세션 ID. 같은 Issue 의 다음 attempt 가
                  MUNINN_RESUME_SESSION_ID 로 이어받아(resume) 직전 진단 컨텍스트를 재사용한다(§5.5).
                  resume 범위는 Issue 내 attempt 간으로 한정 — Issue 간 연속성은 메모리(recall)가 담당.
                type: string
              startedAt:
                format: date-time
                type: string
              step:
                format: int32
                type: integer
              tokens:
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}

                  command:
                    description: 'command: 엔트리포인트(비면 기본 ["/usr/local/bin/claude_skill.sh"])'
                    items:
                      type: string
                    type: array
                  env:
                    description: 'env: 주입 컨텍스트 + 인증(secretKeyRef). Issue 생성 시점 스냅샷(§5.1).'

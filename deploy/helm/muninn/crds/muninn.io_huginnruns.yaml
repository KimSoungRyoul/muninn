                description: 'jobTemplate: Pod 실행 recipe. Job 생성 후 불변(갱신해도 Pod 미반영;
                  위 주석 참고).'
                properties:
                  claudePVCName:
                    description: 'claudePVCName: ~/.claude 로 마운트할 앱별 PVC(§5.5). 비면

# Muninn DevOps Agent Platform — Helm values.
#
# 설치 권장:
#   helm install muninn deploy/helm/muninn -n muninn --create-namespace
# (operator 가 Job 에 주입하는 기본 endpoint 가 `muninn` namespace 를 가정한다 — helpers.go.)
#
# PostgreSQL 은 이 chart 가 만들지 않는다. 외부 인스턴스를 `externalPostgresql.*` 로 가리킨다.

# 이름 override.
nameOverride: ""
fullnameOverride: ""

# 모든 워크로드에 공통 적용할 image pull secret (예: ghcr 비공개 이미지).
imagePullSecrets: []
# - name: ghcr-creds

# 추가 공통 라벨 (모든 리소스).
commonLabels: {}

# ─────────────────────────────────────────────────────────────────────────────
# Huginn Operator — CRD 컨트롤 플레인 (플랫폼 코어). 항상 권장.
# ─────────────────────────────────────────────────────────────────────────────
operator:
  enabled: true
  replicaCount: 1

  image:
    # CI 미발행. 로컬 빌드 후 kind 에 load 하거나, 발행 후 ghcr 경로로 교체한다.
    #   make -C huginnOperator docker-build IMG=ghcr.io/kimsoungryoul/muninn/huginn-operator:<tag>
    repository: controller
    tag: latest
    pullPolicy: IfNotPresent

  # leader election (단일 active manager 보장). 다중 replica 시 필수.
  leaderElection:
    enabled: true

  # metrics endpoint. secure=true 면 controller-runtime 가 self-signed cert 를
  # 자동 생성하므로 cert-manager 없이도 동작한다(개발/테스트). 0 으로 두면 비활성.
  metrics:
    enabled: true
    secure: true
    # 관례: HTTPS(secure=true)=8443, HTTP(secure=false)=8080. secure 를 끄면 port 도 8080 으로 바꾸길 권장.
    port: 8443
    service:
      type: ClusterIP
    # Prometheus Operator 가 있을 때만. ServiceMonitor 를 만든다.
    serviceMonitor:
      enabled: false
      interval: 30s
      scrapeTimeout: 10s
      labels: {}

  # Admission webhook (HuginnAgent mutate/validate). cert-manager 필요.
  # 기본 off — 끄면 deployment 에 ENABLE_WEBHOOKS=false 가 주입되고 webhook
  # 리소스/마운트가 생성되지 않는다(cmd/main.go: ENABLE_WEBHOOKS!="false" 면 켜짐).
  webhook:
    enabled: false
    port: 9443
    # cert-manager 가 caBundle 을 주입하도록 cert-manager.io/inject-ca-from 사용.
    certManager:
      enabled: true
      # 비우면 chart 가 self-signed Issuer + Certificate 를 생성한다.
      issuerRef: {}
      #   name: my-issuer
      #   kind: ClusterIssuer

  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi

  # Pod 보안/스케줄링.
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  priorityClassName: ""

  serviceAccount:
    create: true
    # 비우면 fullname-controller-manager 로 생성.
    name: ""
    annotations: {}

# ─────────────────────────────────────────────────────────────────────────────
# Muninn Web 콘솔 (CopilotKit 프로토타입). 데이터는 mock — 영속 백엔드 없음.
# ─────────────────────────────────────────────────────────────────────────────
web:
  enabled: true
  replicaCount: 1

  image:
    repository: ghcr.io/kimsoungryoul/muninn/muninn-web
    tag: dev
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 3030

  # 콘솔 코파일럿 모델 (구독 OAuth 의 rate limit 경합이 적은 Haiku 4.5 기본).
  copilot:
    model: claude-haiku-4-5-20251001
    telemetryDisabled: true

  # 자격은 env(Secret)로만 주입한다. 토큰을 values 에 절대 커밋하지 말 것.
  # existingSecret 권장(키: claude-code-oauth-token 또는 anthropic-api-key).
  auth:
    existingSecret: ""

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: muninn.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    limits:
      cpu: "1"
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ─────────────────────────────────────────────────────────────────────────────
# Agent Runtime — operator 가 런타임에 Job 으로 실행한다(여기서 직접 배포하지 않음).
# chart 는 Job 이 사용할 ServiceAccount 와 인증 Secret 배선만 준비한다.
# ─────────────────────────────────────────────────────────────────────────────
agent:
  # operator 가 만든 Job pod 이 사용하는 SA (helpers.go: "huginn-agent").
  serviceAccount:
    create: true
    name: huginn-agent
    annotations: {}

  # 참고용 기본 이미지. 실제 이미지는 HuginnAgent CR 의 spec.agent.image 로 지정한다.
  image:
    repository: ghcr.io/kimsoungryoul/muninn/agent-runtime
    tag: latest

  # agent-secrets Secret (operator 가 Job env 로 주입: anthropic-api-key / claude-code-oauth-token).
  # 자격은 절대 커밋 금지(루트 CLAUDE.md "Auth is env(Secret)-only") → chart 가 만들지 않는다.
  # 런타임에 kubectl 로 직접 생성한다(operator 는 아래 name 으로 참조):
  #   kubectl -n muninn create secret generic agent-secrets \
  #     --from-literal=claude-code-oauth-token="$CLAUDE_CODE_OAUTH_TOKEN"
  secrets:
    name: agent-secrets

# ─────────────────────────────────────────────────────────────────────────────
# CRD 설치 — Helm 의 crds/ 디렉토리로 관리된다.
#   - install 시 자동 적용, uninstall 시 보존(데이터 보호)
#   - upgrade 시 자동 갱신 안 됨 → CRD 변경은 `kubectl apply` 또는 `make manifests` 후 수동 적용
#   - CRD 적용을 건너뛰려면: helm install --skip-crds
# (values 토글이 아니라 Helm 내장 동작이다. 여기 키는 문서화 목적.)
crds:
  # 정보성 플래그. 실제 제어는 `helm --skip-crds`.
  managedByHelm: true

# ─────────────────────────────────────────────────────────────────────────────
# 외부 PostgreSQL — chart 가 DB 를 생성하지 않는다(요구사항). 외부 인스턴스를 가리킨다.
# muninn-api / muninn-memory(설계 §8, Phase 0 로드맵, 미구현)가 소비할 연결 정보를
# Secret 으로 등록한다. enabled=false 면 아무 것도 만들지 않는다.
# ─────────────────────────────────────────────────────────────────────────────
externalPostgresql:
  enabled: false
  host: ""
  port: 5432
  database: muninn
  username: muninn
  sslmode: disable
  # 비밀번호는 평문으로 보관하지 않는다(루트 CLAUDE.md "credentials never in manifests/values").
  # 별도 Secret 에 두고 그 이름/키만 참조한다. 소비 워크로드가 이 Secret 의 키를 env 로 주입한다.
  existingSecret: ""
  existingSecretPasswordKey: password
  # chart 가 만드는 연결 메타 Secret 이름(비밀번호 제외; 소비 워크로드가 참조). enabled=true 일 때 생성.
  connectionSecretName: muninn-db

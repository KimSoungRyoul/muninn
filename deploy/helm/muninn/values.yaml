# Muninn DevOps Agent Platform — Helm values.
#
# 설치 권장:
#   helm install muninn deploy/helm/muninn -n muninn --create-namespace
# operator 가 agent Job 에 주입하는 보고/메모리 endpoint(MUNINN_API_ENDPOINT/MUNINN_MEMORY_ENDPOINT)는
# web.enabled=true 일 때 chart 가 이 릴리스의 muninn-web Service(<release>-web.<ns>.svc:3030)로 배선한다
# (operator/deployment.yaml). web.enabled=false 면 operator 는 코드 fallback 을 쓰므로 보고가 동작하지 않는다.
#
# PostgreSQL 은 이 chart 가 만들지 않는다. 메모리 DB 는 `metaDb.*`(권장: CNPG)로 외부 연결한다.

# 이름 override.
nameOverride: ""
fullnameOverride: ""

# 모든 워크로드에 공통 적용할 image pull secret (예: ghcr 비공개 이미지).
imagePullSecrets: []
# - name: ghcr-creds

# 추가 공통 라벨 (모든 리소스).
commonLabels: {}

# ─────────────────────────────────────────────────────────────────────────────
# Huginn Operator — CRD 컨트롤 플레인 (플랫폼 코어). 항상 권장.
# ─────────────────────────────────────────────────────────────────────────────
operator:
  enabled: true
  replicaCount: 1

  image:
    # CI 미발행. 로컬 빌드 후 kind 에 load 하거나, 발행 후 ghcr 경로로 교체한다.
    #   make -C huginnOperator docker-build IMG=ghcr.io/kimsoungryoul/muninn/huginn-operator:<tag>
    repository: controller
    tag: latest
    pullPolicy: IfNotPresent

  # leader election (단일 active manager 보장). 다중 replica 시 필수.
  leaderElection:
    enabled: true

  # metrics endpoint. secure=true 면 controller-runtime 가 self-signed cert 를
  # 자동 생성하므로 cert-manager 없이도 동작한다(개발/테스트). 0 으로 두면 비활성.
  metrics:
    enabled: true
    secure: true
    # 관례: HTTPS(secure=true)=8443, HTTP(secure=false)=8080. secure 를 끄면 port 도 8080 으로 바꾸길 권장.
    port: 8443
    service:
      type: ClusterIP
    # Prometheus Operator 가 있을 때만. ServiceMonitor 를 만든다.
    serviceMonitor:
      enabled: false
      interval: 30s
      scrapeTimeout: 10s
      labels: {}

  # Admission webhook (HuginnAgent mutate/validate). cert-manager 필요.
  # 기본 off — 끄면 deployment 에 ENABLE_WEBHOOKS=false 가 주입되고 webhook
  # 리소스/마운트가 생성되지 않는다(cmd/main.go: ENABLE_WEBHOOKS!="false" 면 켜짐).
  webhook:
    enabled: false
    port: 9443
    # cert-manager 가 caBundle 을 주입하도록 cert-manager.io/inject-ca-from 사용.
    certManager:
      enabled: true
      # 비우면 chart 가 self-signed Issuer + Certificate 를 생성한다.
      issuerRef: {}
      #   name: my-issuer
      #   kind: ClusterIssuer

  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi

  # Pod 보안/스케줄링.
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  priorityClassName: ""

  serviceAccount:
    create: true
    # 비우면 fullname-controller-manager 로 생성.
    name: ""
    annotations: {}

# ─────────────────────────────────────────────────────────────────────────────
# Muninn Web — 콘솔 + Muninn API(게이트웨이) + 메모리. dual-mode:
#   - K8s 자격(SA 토큰)이 있으면 실 HuginnIssue/HuginnRun CR 생성·patch(lib/k8s.ts).
#   - metaDb.enabled=true 면 DATABASE_URL 로 외부 postgres 에 메모리 저장·recall(lib/db.ts).
#   - 둘 다 없으면 lib/data.ts mock 으로 폴백한다. (CopilotKit 콘솔 포함.)
# ─────────────────────────────────────────────────────────────────────────────
web:
  enabled: true
  replicaCount: 1

  image:
    repository: ghcr.io/kimsoungryoul/muninn/muninn-web
    tag: dev
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 3030

  # 콘솔 코파일럿 모델 (구독 OAuth 의 rate limit 경합이 적은 Haiku 4.5 기본).
  copilot:
    model: claude-haiku-4-5-20251001
    telemetryDisabled: true

  # 자격은 env(Secret)로만 주입한다. 토큰을 values 에 절대 커밋하지 말 것.
  # existingSecret 권장(키: claude-code-oauth-token 또는 anthropic-api-key).
  auth:
    existingSecret: ""

  # muninn-web 는 Muninn API 다 — HuginnIssue 생성·HuginnRun 보고/승인 패치로 K8s API 를 호출한다.
  # 따라서 ServiceAccount + Role(huginn* 한정) 이 필요하다(web/rbac.yaml). 끄면 K8s 연동이 비활성된다.
  serviceAccount:
    create: true
    name: ""
    annotations: {}
    # SA 토큰 마운트. 이 Deployment 는 in-cluster K8s API 호출이 존재 이유라 기본 true 다.
    # serviceAccount.create 와 분리한다 — create=false + name=<기존 SA> 조합에서도 토큰이 마운트돼야
    # k8sEnabled()가 통과한다(아니면 자격 없이 조용히 mock 폴백 → 설정 오류 은폐).
    automount: true
  rbac:
    create: true

  # Muninn API 인증 토큰(MUNINN_API_TOKEN). 설정되면 web 이 상태변경 라우트(보고·승인·위임·webhook)에
  # Authorization: Bearer <token> 를 요구한다(lib/auth.ts). 런타임 agent(runner.py)·operator 가 보내는
  # 토큰과 동일해야 한다 — operator 는 agent-secrets 의 muninn-api-token 키를 agent Job 에 주입하므로,
  # 같은 Secret/키를 web 에도 가리키는 것이 기본값이다(미설정 시 web 은 dev 모드로 인증 비활성+경고).
  apiToken:
    # 토큰을 담은 Secret 이름. 비우면 agent.secrets.name(agent-secrets)을 쓴다.
    existingSecret: ""
    key: muninn-api-token

  # CR 이 사는 namespace(MUNINN_NAMESPACE). 비우면 릴리스 namespace 를 쓴다.
  namespaceOverride: ""

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: muninn.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    limits:
      cpu: "1"
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ─────────────────────────────────────────────────────────────────────────────
# Agent Runtime — operator 가 런타임에 Job 으로 실행한다(여기서 직접 배포하지 않음).
# chart 는 Job 이 사용할 ServiceAccount 와 인증 Secret 배선만 준비한다.
# ─────────────────────────────────────────────────────────────────────────────
agent:
  # operator 가 만든 Job pod 이 사용하는 SA. ⚠️ 이름은 operator 가 상수로 하드코딩한다
  # (helpers.go: serviceAccountName="huginn-agent"). 따라서 name 은 사실상 고정 계약이다 —
  # 다른 값으로 바꾸면 chart 가 쓸모없는 SA 를 만들고 operator 는 huginn-agent 를 별도 자동생성한다.
  # 오설정 방지를 위해 chart 가 비-기본 name 을 fail-fast 로 막는다(templates/agent/serviceaccount.yaml).
  serviceAccount:
    create: true
    name: huginn-agent
    annotations: {}

  # 참고용 기본 이미지. 실제 이미지는 HuginnAgent CR 의 spec.agent.image 로 지정한다.
  image:
    repository: ghcr.io/kimsoungryoul/muninn/agent-runtime
    tag: latest

  # agent-secrets Secret (operator 가 Job env 로 주입: anthropic-api-key / claude-code-oauth-token /
  #  muninn-api-token). 자격은 절대 커밋 금지(루트 CLAUDE.md "Auth is env(Secret)-only") → chart 가 만들지 않는다.
  # ⚠️ 이름은 operator 가 상수로 하드코딩한다(helpers.go: agentSecretName="agent-secrets") — 고정 계약이다.
  # 비-기본 name 으로 바꾸면 operator 가 여전히 agent-secrets 를 참조해 인증 없는 실행이 된다(chart 가 fail-fast).
  # 런타임에 kubectl 로 직접 생성한다:
  #   kubectl -n muninn create secret generic agent-secrets \
  #     --from-literal=claude-code-oauth-token="$CLAUDE_CODE_OAUTH_TOKEN" \
  #     --from-literal=muninn-api-token="$(openssl rand -hex 32)"
  secrets:
    name: agent-secrets

# ─────────────────────────────────────────────────────────────────────────────
# CRD 설치 — Helm 의 crds/ 디렉토리로 관리된다.
#   - install 시 자동 적용, uninstall 시 보존(데이터 보호)
#   - upgrade 시 자동 갱신 안 됨 → CRD 변경은 `kubectl apply` 또는 `make manifests` 후 수동 적용
#   - CRD 적용을 건너뛰려면: helm install --skip-crds
# (values 토글이 아니라 Helm 내장 동작이다. 여기 키는 문서화 목적.)
crds:
  # 정보성 플래그. 실제 제어는 `helm --skip-crds`.
  managedByHelm: true

# ─────────────────────────────────────────────────────────────────────────────
# metaDB — muninn-web(Muninn API)가 쓰는 메모리 DB(postgres) 연결.
# chart 는 DB 를 만들지 않는다 — 권장 경로는 CloudNativePG(CNPG)로 외부 provision 후
# 그 연결 Secret(<cluster>-app, 키 uri)을 가리키는 것이다(deploy/quickstart/README.md).
# enabled=true 면 web Deployment 에 DATABASE_URL(= Secret 의 uriKey)을 주입한다.
# 검색은 텍스트(to_tsvector/ts_rank_cd)만 쓰므로 pgvector·확장은 불필요하다.
# ─────────────────────────────────────────────────────────────────────────────
metaDb:
  enabled: false
  # CNPG app secret 등 전체 connection string(postgres://...)을 담은 Secret/키.
  existingSecret: "" # 예: muninn-metadb-app
  uriKey: uri

# ─────────────────────────────────────────────────────────────────────────────
# (legacy) 외부 PostgreSQL 연결 메타 Secret — 미구현 소비자(muninn-api/muninn-memory)용.
# muninn-web 의 DB 연결은 위 metaDb 를 쓴다. enabled=false 면 아무 것도 만들지 않는다.
# ─────────────────────────────────────────────────────────────────────────────
externalPostgresql:
  enabled: false
  host: ""
  port: 5432
  database: muninn
  username: muninn
  sslmode: disable
  # 비밀번호는 평문으로 보관하지 않는다(루트 CLAUDE.md "credentials never in manifests/values").
  # 별도 Secret 에 두고 그 이름/키만 참조한다. 소비 워크로드가 이 Secret 의 키를 env 로 주입한다.
  existingSecret: ""
  existingSecretPasswordKey: password
  # chart 가 만드는 연결 메타 Secret 이름(비밀번호 제외; 소비 워크로드가 참조). enabled=true 일 때 생성.
  connectionSecretName: muninn-db

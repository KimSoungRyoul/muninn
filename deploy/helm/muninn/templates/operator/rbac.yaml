{{- if .Values.operator.enabled -}}
{{- $sa := include "muninn.operator.serviceAccountName" . -}}
# ── manager ClusterRole (operator 가 CRD/Job/PVC/SA/Secret 등을 다룬다) ──
# 원본: huginnOperator/config/rbac/role.yaml (kubebuilder generated). 동기화 주의.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "muninn.fullname" . }}-manager-role
  labels:
    {{- include "muninn.operator.labels" . | nindent 4 }}
rules:
# pods 만 cluster-wide read(Job pod 관측). configmaps/secrets 의 cluster-wide read 는 제거됐다 —
# agent 의 SOUL/이벤트 페이로드/인증 Secret 접근은 operator 가 아니라 agent SA 의 namespace 한정 Role
# (huginnagent_controller.ensureAgentRBAC)이 담당한다(최소권한; 원본 role.yaml 과 동기화).
- apiGroups: [""]
  resources: [pods]
  verbs: [get, list, watch]
- apiGroups: [""]
  resources: [events]
  verbs: [create, patch]
- apiGroups: [""]
  resources: [persistentvolumeclaims]
  verbs: [create, get, list, patch, watch]
- apiGroups: [""]
  resources: [serviceaccounts]
  verbs: [create, get, list, watch]
- apiGroups: [batch]
  resources: [jobs]
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [muninn.io]
  resources: [huginnagents, huginnissues, huginnruns]
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [muninn.io]
  resources: [huginnagents/finalizers, huginnissues/finalizers, huginnruns/finalizers]
  verbs: [update]
- apiGroups: [muninn.io]
  resources: [huginnagents/status, huginnissues/status, huginnruns/status]
  verbs: [get, patch, update]
# agent SA 최소권한 Role 부여용(§6.2-5): operator 가 agent SA 에 grant 하는 권한을 자신도 보유해야
# privilege-escalation 거부를 피한다(과거 kind e2e 회귀). secrets/configmaps 는 제외. config/rbac/role.yaml 과 동기.
- apiGroups: [""]
  resources: [pods/log]
  verbs: [get]
- apiGroups: [apps]
  resources: [deployments, replicasets]
  verbs: [get, list, watch]
- apiGroups: [rbac.authorization.k8s.io]
  resources: [roles, rolebindings]
  verbs: [create, get, list, patch, update, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "muninn.fullname" . }}-manager-rolebinding
  labels:
    {{- include "muninn.operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "muninn.fullname" . }}-manager-role
subjects:
- kind: ServiceAccount
  name: {{ $sa }}
  namespace: {{ .Release.Namespace }}
{{- if .Values.operator.leaderElection.enabled }}
---
# ── leader election (namespace-scoped) ──
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "muninn.fullname" . }}-leader-election-role
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "muninn.operator.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: [configmaps]
  verbs: [get, list, watch, create, update, patch, delete]
- apiGroups: [coordination.k8s.io]
  resources: [leases]
  verbs: [get, list, watch, create, update, patch, delete]
- apiGroups: [""]
  resources: [events]
  verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "muninn.fullname" . }}-leader-election-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "muninn.operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "muninn.fullname" . }}-leader-election-role
subjects:
- kind: ServiceAccount
  name: {{ $sa }}
  namespace: {{ .Release.Namespace }}
{{- end }}
{{- if and .Values.operator.metrics.enabled .Values.operator.metrics.secure }}
---
# ── secure metrics authn/authz (controller-runtime FilterProvider 가 사용) ──
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "muninn.fullname" . }}-metrics-auth-role
  labels:
    {{- include "muninn.operator.labels" . | nindent 4 }}
rules:
- apiGroups: [authentication.k8s.io]
  resources: [tokenreviews]
  verbs: [create]
- apiGroups: [authorization.k8s.io]
  resources: [subjectaccessreviews]
  verbs: [create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "muninn.fullname" . }}-metrics-auth-rolebinding
  labels:
    {{- include "muninn.operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "muninn.fullname" . }}-metrics-auth-role
subjects:
- kind: ServiceAccount
  name: {{ $sa }}
  namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}

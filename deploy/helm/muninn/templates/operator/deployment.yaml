{{- if .Values.operator.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "muninn.operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "muninn.operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.operator.replicaCount }}
  selector:
    matchLabels:
      {{- include "muninn.operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        {{- with .Values.operator.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "muninn.operator.selectorLabels" . | nindent 8 }}
        {{- with .Values.operator.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "muninn.operator.serviceAccountName" . }}
      terminationGracePeriodSeconds: 10
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.operator.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: {{ include "muninn.image" (dict "image" .Values.operator.image "root" .) }}
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          command:
            - /manager
          args:
            - --health-probe-bind-address=:8081
            {{- if .Values.operator.leaderElection.enabled }}
            - --leader-elect
            {{- end }}
            {{- if .Values.operator.metrics.enabled }}
            - --metrics-bind-address=:{{ .Values.operator.metrics.port }}
            - --metrics-secure={{ .Values.operator.metrics.secure }}
            {{- else }}
            - --metrics-bind-address=0
            {{- end }}
            {{- if .Values.operator.webhook.enabled }}
            - --webhook-cert-path=/tmp/k8s-webhook-server/serving-certs
            {{- end }}
          env:
            {{- if not .Values.operator.webhook.enabled }}
            # webhook off → main.go 의 webhook setup 을 건너뛴다(cert 불필요).
            - name: ENABLE_WEBHOOKS
              value: "false"
            {{- end }}
          ports:
            {{- if .Values.operator.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.operator.metrics.port }}
              protocol: TCP
            {{- end }}
            {{- if .Values.operator.webhook.enabled }}
            - name: webhook-server
              containerPort: {{ .Values.operator.webhook.port }}
              protocol: TCP
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - "ALL"
          {{- if .Values.operator.webhook.enabled }}
          volumeMounts:
            - name: webhook-certs
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
          {{- end }}
      {{- if .Values.operator.webhook.enabled }}
      volumes:
        - name: webhook-certs
          secret:
            secretName: {{ include "muninn.operator.fullname" . }}-webhook-cert
      {{- end }}
      {{- with .Values.operator.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.operator.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.operator.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

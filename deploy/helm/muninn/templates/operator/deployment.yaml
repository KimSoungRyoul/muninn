{{- if .Values.operator.enabled -}}
{{- if and .Values.operator.webhook.enabled (not .Values.operator.webhook.certManager.enabled) }}
{{- fail "operator.webhook.enabled=true 는 operator.webhook.certManager.enabled=true 가 필요합니다(이 chart 는 cert-manager 로만 webhook 인증서를 발급합니다). cert-manager 설치 후 다시 시도하거나 webhook 을 끄세요." }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "muninn.operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "muninn.operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.operator.replicaCount }}
  selector:
    matchLabels:
      {{- include "muninn.operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        {{- with .Values.operator.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "muninn.operator.selectorLabels" . | nindent 8 }}
        {{- with .Values.operator.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "muninn.operator.serviceAccountName" . }}
      terminationGracePeriodSeconds: 10
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.operator.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: {{ include "muninn.image" (dict "image" .Values.operator.image "root" .) }}
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          command:
            - /manager
          args:
            - --health-probe-bind-address=:8081
            {{- if .Values.operator.leaderElection.enabled }}
            - --leader-elect
            {{- end }}
            {{- if .Values.operator.metrics.enabled }}
            - --metrics-bind-address=:{{ .Values.operator.metrics.port }}
            - --metrics-secure={{ .Values.operator.metrics.secure }}
            {{- else }}
            - --metrics-bind-address=0
            {{- end }}
            {{- if .Values.operator.webhook.enabled }}
            - --webhook-cert-path=/tmp/k8s-webhook-server/serving-certs
            {{- end }}
          env:
            {{- if not .Values.operator.webhook.enabled }}
            # webhook off → main.go 의 webhook setup 을 건너뛴다(cert 불필요).
            - name: ENABLE_WEBHOOKS
              value: "false"
            {{- end }}
            {{- if .Values.web.enabled }}
            # agent Job 이 보고/메모리에 쓸 Muninn API(=muninn-web) 엔드포인트. operator 가
            # HuginnIssue→Run 생성 시 Job env(MUNINN_API_ENDPOINT/MEMORY_ENDPOINT)로 전달한다.
            - name: MUNINN_API_ENDPOINT
              value: "http://{{ include "muninn.web.fullname" . }}.{{ .Release.Namespace }}.svc:{{ .Values.web.service.port }}"
            - name: MUNINN_MEMORY_ENDPOINT
              value: "http://{{ include "muninn.web.fullname" . }}.{{ .Release.Namespace }}.svc:{{ .Values.web.service.port }}"
            {{- end }}
          ports:
            {{- if .Values.operator.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.operator.metrics.port }}
              protocol: TCP
            {{- end }}
            {{- if .Values.operator.webhook.enabled }}
            - name: webhook-server
              containerPort: {{ .Values.operator.webhook.port }}
              protocol: TCP
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - "ALL"
          {{- if .Values.operator.webhook.enabled }}
          volumeMounts:
            - name: webhook-certs
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
          {{- end }}
      {{- if .Values.operator.webhook.enabled }}
      volumes:
        - name: webhook-certs
          secret:
            secretName: {{ include "muninn.operator.fullname" . }}-webhook-cert
      {{- end }}
      {{- with .Values.operator.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.operator.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.operator.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

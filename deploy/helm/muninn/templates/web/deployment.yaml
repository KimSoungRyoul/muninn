{{- if .Values.web.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "muninn.web.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "muninn.web.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      {{- include "muninn.web.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "muninn.web.selectorLabels" . | nindent 8 }}
        {{- with .Values.web.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.web.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: {{ include "muninn.image" (dict "image" .Values.web.image "root" .) }}
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3030
              protocol: TCP
          env:
            # 자격은 env(Secret)로만. 둘 중 하나면 충분 → 둘 다 optional 주입.
            {{- if .Values.web.auth.existingSecret }}
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.web.auth.existingSecret }}
                  key: claude-code-oauth-token
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.web.auth.existingSecret }}
                  key: anthropic-api-key
                  optional: true
            {{- end }}
            - name: COPILOT_MODEL
              value: {{ .Values.web.copilot.model | quote }}
            - name: COPILOTKIT_TELEMETRY_DISABLED
              value: {{ .Values.web.copilot.telemetryDisabled | quote }}
          # probe 는 가벼운 `/`(정적 셸; 과금 없음)를 친다. selftest 는 Anthropic 왕복이라 제외.
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - "ALL"
      {{- with .Values.web.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

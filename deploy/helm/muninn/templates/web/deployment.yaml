{{- if .Values.web.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "muninn.web.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "muninn.web.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      {{- include "muninn.web.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.web.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "muninn.web.selectorLabels" . | nindent 8 }}
        {{- with .Values.web.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      # muninn-web 는 Muninn API 다 — HuginnIssue 생성·HuginnRun 보고/승인 패치로 K8s API 를 호출한다.
      # 따라서 SA + 토큰 마운트가 필요(web/rbac.yaml 의 Role 로 huginn* 한정 권한).
      serviceAccountName: {{ include "muninn.web.serviceAccountName" . }}
      # 토큰 마운트는 SA 생성 여부와 분리한다 — 기존 SA(create=false) 사용 시에도 in-cluster K8s
      # 자격이 있어야 k8sEnabled()가 통과한다(아니면 조용히 mock 폴백). 기본 true.
      automountServiceAccountToken: {{ .Values.web.serviceAccount.automount }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: {{ include "muninn.image" (dict "image" .Values.web.image "root" .) }}
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3030
              protocol: TCP
          env:
            # 자격은 env(Secret)로만. 둘 중 하나면 충분 → 둘 다 optional 주입.
            {{- if .Values.web.auth.existingSecret }}
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.web.auth.existingSecret }}
                  key: claude-code-oauth-token
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.web.auth.existingSecret }}
                  key: anthropic-api-key
                  optional: true
            {{- end }}
            - name: COPILOT_MODEL
              value: {{ .Values.web.copilot.model | quote }}
            - name: COPILOTKIT_TELEMETRY_DISABLED
              value: {{ .Values.web.copilot.telemetryDisabled | quote }}
            # CR 이 사는 namespace(lib/k8s.ts DEFAULT_NAMESPACE). 기본=릴리스 namespace.
            - name: MUNINN_NAMESPACE
              value: {{ .Values.web.namespaceOverride | default .Release.Namespace | quote }}
            # 멀티테넌시(CONTRACT §2): 워크스페이스=네임스페이스. 요청에 헤더 x-muninn-workspace/
            # ?workspace= 가 없을 때의 폴백(lib/workspace.ts·lib/db.ts). 기본=릴리스 namespace.
            - name: MUNINN_WORKSPACE
              value: {{ .Values.web.workspace | default .Release.Namespace | quote }}
            {{- if .Values.web.oidc.issuer }}
            # OIDC(CONTRACT §1): 사람용 콘솔 경로(운영자 승인/거절/위임)는 운영자 SSO JWT 를
            # JWKS 로 검증한다(lib/auth.ts). issuer 가 설정되면 활성 — JWKS_URI 미설정 시
            # issuer 의 .well-known/jwks.json 으로 디스커버리. audience 는 토큰 aud 검증용.
            - name: MUNINN_OIDC_ISSUER
              value: {{ .Values.web.oidc.issuer | quote }}
            {{- if .Values.web.oidc.audience }}
            - name: MUNINN_OIDC_AUDIENCE
              value: {{ .Values.web.oidc.audience | quote }}
            {{- end }}
            {{- if .Values.web.oidc.jwksUri }}
            - name: MUNINN_OIDC_JWKS_URI
              value: {{ .Values.web.oidc.jwksUri | quote }}
            {{- end }}
            {{- end }}
            # Muninn API 인증 토큰(lib/auth.ts). agent(runner.py)·operator 와 동일 토큰이어야 한다.
            # 기본은 agent-secrets 의 muninn-api-token 키(operator 가 agent Job 에 주입하는 것과 동일).
            # 키가 없으면 optional=true 라 빈 값 → web 은 dev 모드(인증 비활성+경고)로 동작한다.
            - name: MUNINN_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.web.apiToken.existingSecret | default .Values.agent.secrets.name }}
                  key: {{ .Values.web.apiToken.key | quote }}
                  optional: true
            {{- if .Values.metaDb.enabled }}
            # 메모리 metaDB 연결 — CNPG(또는 외부 DB)가 만든 Secret 의 uri 키를 DATABASE_URL 로 주입.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ required "metaDb.enabled=true 면 metaDb.existingSecret 가 필요합니다(CNPG <cluster>-app 등)." .Values.metaDb.existingSecret }}
                  key: {{ .Values.metaDb.uriKey | quote }}
            {{- end }}
          # probe 는 가벼운 `/`(정적 셸; 과금 없음)를 친다. selftest 는 Anthropic 왕복이라 제외.
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          securityContext:
            # runAsUser 는 pod securityContext(1001)에서 상속한다.
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - "ALL"
          volumeMounts:
            # Next.js standalone 런타임 임시 쓰기용(readOnlyRootFilesystem 보완).
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
      {{- with .Values.web.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

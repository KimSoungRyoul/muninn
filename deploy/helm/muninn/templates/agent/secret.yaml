{{- if .Values.agent.secrets.create -}}
# ⚠️ 자격(키/토큰)은 원칙적으로 repo/values 에 커밋 금지(루트 CLAUDE.md "Auth is env(Secret)-only").
# create=true 는 테스트 편의용. 운영은 secrets.create=false + 런타임 kubectl 생성을 권장한다.
{{- if and (not .Values.agent.secrets.anthropicApiKey) (not .Values.agent.secrets.claudeCodeOauthToken) }}
{{- fail "agent.secrets.create=true 이면 anthropicApiKey 또는 claudeCodeOauthToken 중 하나는 필요합니다." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.agent.secrets.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "muninn.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
type: Opaque
stringData:
  {{- with .Values.agent.secrets.anthropicApiKey }}
  anthropic-api-key: {{ . | quote }}
  {{- end }}
  {{- with .Values.agent.secrets.claudeCodeOauthToken }}
  claude-code-oauth-token: {{ . | quote }}
  {{- end }}
{{- end }}

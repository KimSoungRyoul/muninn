{{- if .Values.operator.enabled -}}
{{- /* operator 가 SA/Secret 이름을 상수로 하드코딩하므로(helpers.go) 비-기본값은 조용히 무력화된다 → fail-fast. */ -}}
{{- if ne .Values.agent.serviceAccount.name "huginn-agent" -}}
{{- fail "agent.serviceAccount.name 은 operator 가 'huginn-agent' 로 하드코딩한 고정 계약입니다. 다른 값으로 바꾸면 operator 가 무시하므로(쓸모없는 SA 생성) 변경하지 마세요(helpers.go: serviceAccountName)." -}}
{{- end -}}
{{- if ne .Values.agent.secrets.name "agent-secrets" -}}
{{- fail "agent.secrets.name 은 operator 가 'agent-secrets' 로 하드코딩한 고정 계약입니다. 다른 값으로 바꾸면 operator 가 여전히 agent-secrets 를 참조해 인증 없는 실행이 됩니다(helpers.go: agentSecretName). 변경하지 마세요." -}}
{{- end -}}
{{- end -}}
{{- if and .Values.operator.enabled .Values.agent.serviceAccount.create -}}
# operator 가 생성하는 Job pod 이 사용하는 SA(helpers.go: serviceAccountName "huginn-agent").
# RBAC(operator 의 ensureAgentRBAC): read-only 진단 권한(pods/pods.log·deployments/replicasets get,list)만
# 부여하며 secrets/configmaps 는 절대 포함하지 않는다(§6.2-5 — 워크스페이스 내 자격 탈취 표면 차단).
# 인증 자격은 K8s API 가 아니라 Pod env 의 secretKeyRef(agent-secrets)로만 주입한다(별개 경로).
# Job 이 도는 namespace 마다 필요하다 — operator 도 serviceaccounts create 권한이 있어 동적 생성하지만,
# 컨트롤 플레인 namespace 엔 chart 가 보장한다.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.agent.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "muninn.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
  {{- with .Values.agent.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# fail-closed(§6.2-5): SA 레벨에서도 토큰 자동마운트를 끈다 — pod 템플릿의 automountServiceAccountToken=false
# (expandPodSpec)에만 의존하지 않도록 SA 에 명시. 도구 루프(kubectl_ro) 도입 시 pod 별로 재개방한다.
automountServiceAccountToken: false
{{- end }}

{{- if and .Values.operator.enabled .Values.agent.serviceAccount.create -}}
# operator 가 생성하는 Job pod 이 사용하는 SA(helpers.go: serviceAccountName "huginn-agent").
# 자기 namespace 의 Secret/ConfigMap 만 read 한다(설계 §6.1). Job 이 도는 namespace 마다 필요하다 —
# operator 도 serviceaccounts create 권한이 있어 동적 생성하지만, 컨트롤 플레인 namespace 엔 chart 가 보장한다.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.agent.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "muninn.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
  {{- with .Values.agent.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
